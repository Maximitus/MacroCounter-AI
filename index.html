<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var ACC = {
            orange: ['#ff8800', '#e67a00', '#e67300', '#cc6600'],
            cyan: ['#06b6d4', '#0891b2', '#0e7490', '#155e75'],
            violet: ['#a78bfa', '#8b5cf6', '#7c3aed', '#6d28d9'],
            green: ['#22c55e', '#16a34a', '#15803d', '#166534'],
            rose: ['#fb7185', '#f43f5e', '#e11d48', '#be123c'],
          };
          var theme = localStorage.getItem('macrocounter-theme');
          if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
          var isLight = theme === 'light';
          var aid = localStorage.getItem('macrocounter-accent') || 'orange';
          var p = ACC[aid] || ACC.orange;
          document.documentElement.style.setProperty('--color-accent', isLight ? p[2] : p[0]);
          document.documentElement.style.setProperty('--color-accent-hover', isLight ? p[3] : p[1]);
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Macro Counter</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
